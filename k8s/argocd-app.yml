apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: zestify
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/suryaparua-official/Microservice-Food-Delivery-Platform.git
    targetRevision: main
    path: k8s
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: zestify
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
