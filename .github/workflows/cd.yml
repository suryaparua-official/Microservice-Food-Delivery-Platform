name: CD

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  update-manifests:
    name: Update K8s image tags
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update image tags in K8s manifests
        run: |
          SHA=${{ github.event.workflow_run.head_sha }}
          SERVICES="auth restaurant utils realtime rider admin frontend"
          for svc in $SERVICES; do
            sed -i "s|image: ${{ secrets.DOCKERHUB_USERNAME }}/zestify-${svc}:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/zestify-${svc}:${SHA}|g" \
              k8s/${svc}/deployment.yml
          done

      - name: Commit and push manifest changes
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add k8s/
          git diff --staged --quiet || git commit -m "ci: update image tags to ${{ github.event.workflow_run.head_sha }}"
          git push

  authenticate-gcp:
    name: Authenticate to GCP and create K8s secrets
    runs-on: ubuntu-latest
    needs: update-manifests
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure GCP credentials
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ secrets.GKE_CLUSTER_NAME }}
          location: ${{ secrets.GKE_CLUSTER_LOCATION }}

      - name: Create namespace if not exists
        run: kubectl apply -f k8s/namespace.yml

      - name: Create or update K8s secrets from GitHub Secrets
        run: |
          kubectl create secret generic zestify-secrets \
            --namespace zestify \
            --from-literal=MONGO_URI="${{ secrets.MONGO_URI }}" \
            --from-literal=JWT_SEC="${{ secrets.JWT_SEC }}" \
            --from-literal=INTERNAL_SERVICE_KEY="${{ secrets.INTERNAL_SERVICE_KEY }}" \
            --from-literal=GOOGLE_CLIENT_ID="${{ secrets.GOOGLE_CLIENT_ID }}" \
            --from-literal=GOOGLE_CLIENT_SECRET="${{ secrets.GOOGLE_CLIENT_SECRET }}" \
            --from-literal=CLOUD_NAME="${{ secrets.CLOUD_NAME }}" \
            --from-literal=CLOUD_API_KEY="${{ secrets.CLOUD_API_KEY }}" \
            --from-literal=CLOUD_SECRET_KEY="${{ secrets.CLOUD_SECRET_KEY }}" \
            --from-literal=RAZORPAY_KEY_ID="${{ secrets.RAZORPAY_KEY_ID }}" \
            --from-literal=RAZORPAY_KEY_SECRET="${{ secrets.RAZORPAY_KEY_SECRET }}" \
            --from-literal=STRIPE_SECRET_KEY="${{ secrets.STRIPE_SECRET_KEY }}" \
            --from-literal=STRIPE_PUBLISHABLE_KEY="${{ secrets.STRIPE_PUBLISHABLE_KEY }}" \
            --from-literal=RABBITMQ_URL="${{ secrets.RABBITMQ_URL }}" \
            --from-literal=DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            --from-literal=REDIS_URL="${{ secrets.REDIS_URL }}" \
            --from-literal=KAFKA_BROKER="${{ secrets.KAFKA_BROKER }}" \
            --from-literal=GMAIL_USER="${{ secrets.GMAIL_USER }}" \
            --from-literal=GMAIL_PASS="${{ secrets.GMAIL_PASS }}" \
            --dry-run=client -o yaml | kubectl apply -f -
